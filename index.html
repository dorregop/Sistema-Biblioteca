<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABP - M4</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script defer type="module" src="./assets/js/script.js"></script>
    <script defer type="module" src="./assets/js/eventos/eventos.js"></script>
</head>

<body>
    <header class="py-3">
        <h1 class="text-center">Biblioteca</h1>
    </header>

    <main class="container">
        <section class="d-flex justify-content-start">
            <div>
                <form class="d-flex align-items-center">
                    <div>
                        <p>Filtrar por:</p>
                    </div>
                    <div>
                        <select class="form-select" aria-label="--">
                            <option selected>--</option>
                            <option value="1">Autor</option>
                            <option value="2">Estado</option>
                            <option value="3">Genero</option>
                        </select>
                    </div>
                    <button type="button" class="btn btn-primary my-3" id="btn-filtrar">Filtrar</button>
                </form>
            </div>
        </section>
        <section>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalLibro">
                Agregar libro
            </button>
            <div class="modal fade" id="modalLibro" tabindex="-1" aria-labelledby="modalLibroLabel" aria-hidden="true">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="modalLibroLabel">
                                Agregar libro
                            </h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar">
                            </button>
                        </div>
                        <form id="form-libro">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="titulo" class="form-label">
                                        Título
                                    </label>
                                    <input type="text" class="form-control" id="titulo" name="titulo" required>
                                </div>
                                <div class="mb-3">
                                    <label for="autor" class="form-label">
                                        Autor
                                    </label>
                                    <input type="text" class="form-control" id="autor" name="autor" required>
                                </div>
                                <div class="mb-3">
                                    <label for="genero" class="form-label">
                                        Género
                                    </label>
                                    <input type="text" class="form-control" id="genero" name="genero" required>
                                </div>
                                <div class="mb-3">
                                    <label for="saga" class="form-label">
                                        Saga
                                    </label>
                                    <input type="text" class="form-control" id="saga" name="saga"
                                        placeholder="Dejar en blanco si no tiene saga">
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                    Cancelar
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    Guardar libro
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-3">
            <div>
                <table class="table" id="tabla-libros">
                    <thead>
                        <tr>
                            <th scope="col" class="text-center">Título</th>
                            <th scope="col" class="text-center">Estado</th>
                            <th scope="col" class="text-center">Autor</th>
                            <th scope="col" class="text-center">Saga</th>
                            <th scope="col" class="text-center">Género</th>
                            <th scope="col" class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla-libros">
                        <!-- AQUÍ SE AGREGAN LAS TAREAS DE FORMA DINÁMICA. -->
                    </tbody>
                </table>

            </div>
        </section>
    </main>

</body>

</html>
